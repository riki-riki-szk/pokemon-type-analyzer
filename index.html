<title>ポケモンわざタイプ範囲チェッカー(Pokemon Type Analyzer)| 単・複合タイプ相性早見表</title>
<meta name="description" content="ポケモンわざタイプ範囲チェッカーは、単タイプ・複合タイプ171通り全ての弱点/耐性/無効とカバー率を一覧表示するだけでなく、カバー率が最大になる技構成や99%を超える最少タイプ数を自動計算できる無料ツールです。">
<meta property="og:title" content="ポケモンわざタイプ範囲チェッカー(Pokemon Type Analyzer)">
<meta property="og:description" content="タイプ相性の一覧表示に加え、カバー率が最大になる技構成を自動計算できる無料ツール。">
<meta property="og:type" content="website">
<meta property="og:locale" content="ja_JP">
<link rel="stylesheet" href="style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9344731255606661"
     crossorigin="anonymous"></script>
</head>
<body>

<div class="container">

<header>
    <div>
        <h1>Pokemon Type Analyzer</h1>
        <p class="site-subtitle">ポケモンわざタイプ範囲チェッカー — 単・複合タイプ相性早見表</p>
    </div>
    <p class="header-note">
        ※この結果は、とくせいや実在するポケモンのタイプ組み合わせに関わらず
        表示しています。技を選ぶ際はご注意ください。
    </p>
</header>

<section class="card">
    <h2>攻撃タイプ</h2>
    <div id="type-list"></div>
</section>

<section class="card">
    <div class="selected-panel">

        <div class="selected-main">
            <div class="selected-header">
                <h2>選択中</h2>
                <span id="selected-count" class="info-badge">0種類選択中</span>
                <span id="selected-coverage-inline" class="info-badge">カバー率 0 / 171 (0.0%)</span>
                <button id="clear-selection" class="clear-button">全選択解除</button>
            </div>
            <div id="selected-types">選択なし</div>
            <div id="suggestion-area" class="suggestion-area"></div>
        </div>

        <div class="auto-select-panel">
            <div class="auto-select-title">自動選択</div>
            <div id="auto-select-list" class="auto-select-list">
                <button class="auto-select-button" data-size="2" title="2タイプで最大カバー率">2タイプ</button>
                <button class="auto-select-button" data-size="3" title="3タイプで最大カバー率">3タイプ</button>
                <button class="auto-select-button" data-size="4" title="4タイプで最大カバー率">4タイプ</button>
                <button class="auto-select-button" data-size="5" title="5タイプで最大カバー率">5タイプ</button>
                <button class="auto-select-button" data-size="6" title="6タイプで最大カバー率">6タイプ</button>
                <button class="auto-select-button" data-size="7" title="7タイプで最大カバー率">7タイプ</button>
                <button class="auto-select-button" data-size="8" title="8タイプで最大カバー率">8タイプ</button>
                <button id="auto-select-threshold" class="auto-select-button" title="カバー率99%を超える最少構成">99%超え最少</button>
            </div>
            <p id="auto-select-status" class="auto-select-status"></p>
        </div>

    </div>
</section>

<section class="card">

    <div class="matrix-wrapper">

        <div id="matrix-panel">
            <table id="matrix-table"></table>
        </div>

        <div id="detail-panel" class="card">

            <h2>詳細</h2>

            <div id="detail">
                表のセルをクリックしてください。
            </div>

        </div>

    </div>

</section>

<footer class="site-footer">
    <nav>
        <a href="index.html">サイトトップ</a>
        <a href="about.html">このツールについて・使い方</a>
        <a href="privacy.html">プライバシーポリシー</a>
    </nav>
    <p class="footer-note">本サイトは非公式のファン制作物です。任天堂・株式会社ゲームフリーク・株式会社ポケモンとは一切関係ありません。</p>
</footer>

</div>

<script src="data/typeChart.js"></script>
<script src="engine.js"></script>
<script src="script.js"></script>

</body>
</html>
